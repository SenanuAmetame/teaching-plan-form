<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Teaching Plan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #eff6ff;
      --success: #16a34a;
      --error: #dc2626;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --row-hover: #f8fafc;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* Top nav */
    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
    }

    .navbar-badge {
      font-size: 11px;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--primary);
      padding: 2px 8px;
      border-radius: 99px;
      letter-spacing: 0.04em;
    }

    .navbar-link {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.1s;
    }

    .navbar-link:hover { color: var(--primary); }

    /* Main layout */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 36px 24px;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 28px;
    }

    .page-title { font-size: 24px; font-weight: 800; letter-spacing: -0.3px; }
    .page-subtitle { font-size: 14px; color: var(--muted); margin-top: 4px; }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .search-input {
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      outline: none;
      width: 260px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input::placeholder { color: #94a3b8; }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.15s, box-shadow 0.15s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 1px 3px rgba(37,99,235,0.25);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      box-shadow: 0 4px 10px rgba(37,99,235,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn-outline {
      background: #fff;
      color: var(--text);
      border: 1.5px solid var(--border);
    }

    .btn-outline:hover { background: var(--bg); }

    /* Table card */
    .table-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }

    th {
      text-align: left;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px 20px;
      white-space: nowrap;
    }

    td {
      padding: 16px 20px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tbody tr:hover td { background: var(--row-hover); }

    .td-name {
      font-weight: 600;
      color: var(--text);
    }

    .td-file {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      max-width: 280px;
    }

    .td-file-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .td-date { color: var(--muted); white-space: nowrap; }
    .td-size { color: var(--muted); white-space: nowrap; }

    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      background: var(--primary-light);
      color: var(--primary);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.12s;
      white-space: nowrap;
    }

    .btn-dl:hover { background: #dbeafe; }

    /* Empty / loading states */
    .state-box {
      text-align: center;
      padding: 64px 24px;
      color: var(--muted);
    }

    .state-icon { font-size: 48px; margin-bottom: 16px; }
    .state-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .state-desc { font-size: 14px; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--text);
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 680px) {
      .navbar { padding: 0 16px; }
      .main { padding: 24px 16px; }
      th:nth-child(3), td:nth-child(3),
      th:nth-child(4), td:nth-child(4) { display: none; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="/admin">
      <img src="/logo.jpg" alt="Salem Logo" style="width:32px;height:32px;object-fit:contain;">
      Salem School — Teaching Plan <span class="navbar-badge">ADMIN</span>
    </a>
    <a class="navbar-link" href="/" target="_blank">View Form ↗</a>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Submissions</h1>
        <p class="page-subtitle">All teaching plans submitted through the form</p>
      </div>
      <button class="btn btn-primary" id="btnDownloadAll" onclick="downloadAll()">
        ⬇ Download All (ZIP)
      </button>
    </div>

    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Total Submissions</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statSize">—</div>
        <div class="stat-label">Total File Size</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statLatest">—</div>
        <div class="stat-label">Latest Submission</div>
      </div>
    </div>

    <div class="toolbar">
      <input
        class="search-input"
        id="searchInput"
        type="text"
        placeholder="Search by name or file…"
        oninput="renderTable()"
      >
      <button class="btn btn-outline" onclick="loadData()">↺ Refresh</button>
    </div>

    <div class="table-card">
      <div id="tableContainer">
        <div class="state-box">
          <div class="spinner"></div>
          <p class="state-desc">Loading submissions…</p>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    let allRows = [];

    function fmtSize(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso + (iso.endsWith('Z') ? '' : 'Z'));
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
           + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    }

    function fileIcon(name) {
      const ext = (name || '').split('.').pop().toLowerCase();
      return { pdf:'📕', doc:'📘', docx:'📘', xls:'📗', xlsx:'📗',
               ppt:'📙', pptx:'📙', txt:'📄', jpg:'🖼️', jpeg:'🖼️',
               png:'🖼️', gif:'🖼️', zip:'🗜️', rar:'🗜️', '7z':'🗜️',
               mp4:'🎬', mov:'🎬', mp3:'🎵', csv:'📊' }[ext] || '📄';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function renderTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const rows = allRows.filter(r =>
        r.full_name.toLowerCase().includes(q) ||
        r.original_filename.toLowerCase().includes(q)
      );

      const container = document.getElementById('tableContainer');

      if (!rows.length) {
        container.innerHTML = `
          <div class="state-box">
            <div class="state-icon">${allRows.length ? '🔍' : '📭'}</div>
            <p class="state-title">${allRows.length ? 'No results found' : 'No submissions yet'}</p>
            <p class="state-desc">${allRows.length ? 'Try a different search term.' : 'Submissions will appear here once people fill out the form.'}</p>
          </div>`;
        return;
      }

      const rowsHtml = rows.map(r => `
        <tr>
          <td class="td-name">${escHtml(r.full_name)}</td>
          <td>
            <div class="td-file">
              <span>${fileIcon(r.original_filename)}</span>
              <span class="td-file-name" title="${escHtml(r.original_filename)}">${escHtml(r.original_filename)}</span>
            </div>
          </td>
          <td class="td-size">${fmtSize(r.file_size)}</td>
          <td class="td-date">${fmtDate(r.uploaded_at)}</td>
          <td>
            <a class="btn-dl" href="/admin/download/${r.id}" download>
              ⬇ Download
            </a>
          </td>
        </tr>
      `).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Full Name</th>
              <th>File</th>
              <th>Size</th>
              <th>Submitted</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>${rowsHtml}</tbody>
        </table>`;
    }

    function updateStats() {
      document.getElementById('statTotal').textContent = allRows.length;

      const totalBytes = allRows.reduce((s, r) => s + (r.file_size || 0), 0);
      document.getElementById('statSize').textContent = fmtSize(totalBytes);

      if (allRows.length) {
        const latest = new Date(allRows[0].uploaded_at + (allRows[0].uploaded_at.endsWith('Z') ? '' : 'Z'));
        const days = Math.floor((Date.now() - latest) / 86400000);
        document.getElementById('statLatest').textContent =
          days === 0 ? 'Today' : days === 1 ? 'Yesterday' : `${days}d ago`;
      } else {
        document.getElementById('statLatest').textContent = '—';
      }
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function loadData() {
      document.getElementById('tableContainer').innerHTML = `
        <div class="state-box"><div class="spinner"></div><p class="state-desc">Loading…</p></div>`;
      try {
        const res = await fetch('/admin/submissions');
        if (res.status === 401) {
          document.getElementById('tableContainer').innerHTML = `
            <div class="state-box">
              <div class="state-icon">🔒</div>
              <p class="state-title">Session expired</p>
              <p class="state-desc"><a href="/admin">Click here to log in again</a></p>
            </div>`;
          return;
        }
        allRows = await res.json();
        updateStats();
        renderTable();
      } catch (err) {
        document.getElementById('tableContainer').innerHTML = `
          <div class="state-box">
            <div class="state-icon">⚠️</div>
            <p class="state-title">Failed to load</p>
            <p class="state-desc">Could not reach the server. <a href="#" onclick="loadData();return false;">Retry</a></p>
          </div>`;
      }
    }

    async function downloadAll() {
      if (!allRows.length) { showToast('No submissions to download.'); return; }
      showToast('Preparing ZIP — download will start shortly…');
      window.location.href = '/admin/download-all';
    }

    loadData();
  </script>
</body>
</html>
